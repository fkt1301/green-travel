version: 2

sources:
  - name: owid
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: _ingested_at
    tables:
      - name: owid_co2_raw
        description: "Raw CO2 and energy data from Our World in Data"
